<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎨 Генератор Изображений</title>
    
    <!-- 🔧 Критически важные заголовки -->
    <meta http-equiv="Content-Security-Policy" 
          content="default-src 'self' https: http:; 
                   img-src *  blob: data: https: http:; 
                   connect-src * https: http:; 
                   style-src 'self' 'unsafe-inline'; 
                   script-src 'self' 'unsafe-inline'">
    <meta name="referrer" content="no-referrer">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; padding: 15px;
        }
        .container {
            background: white; border-radius: 15px;
            padding: 20px; max-width: 100%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        h1 { text-align: center; color: #333; margin: 10px 0; font-size: 1.8em; }
        .subtitle { text-align: center; color: #666; margin-bottom: 20px; font-size: 13px; }
        
        .tip {
            background: #e7f3ff; border-left: 4px solid #2196F3;
            padding: 12px; border-radius: 8px; margin-bottom: 20px;
            font-size: 13px; color: #1976D2;
        }
        
        .input-section { margin: 20px 0; }
        label { display: block; margin-bottom: 8px; color: #555; font-weight: 600; }
        textarea {
            width: 100%; padding: 12px; border: 2px solid #ddd;
            border-radius: 10px; font-size: 16px; min-height: 80px;
        }
        textarea:focus { outline: none; border-color: #667eea; }

        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 20px 0; }
        select {
            width: 100%; padding: 12px; border: 2px solid #ddd;
            border-radius: 10px; font-size: 14px; background: white;
        }
        .generate-btn {
            width: 100%; padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; border: none; border-radius: 10px;
            font-size: 16px; font-weight: 600; cursor: pointer;
        }
        .generate-btn:disabled { opacity: 0.6; }

        .result-section { margin-top: 20px; text-align: center; }
        .image-container {
            min-height: 300px; background: #f5f5f5;
            border-radius: 10px; display: flex;
            justify-content: center; align-items: center;
            overflow: hidden; position: relative;
        }
        .image-container img {
            max-width: 100%; max-height: 400px;
            border-radius: 10px; display: none;
        }

        .loading {
            display: none; flex-direction: column;
            align-items: center; padding: 20px;
        }
        .spinner {
            width: 40px; height: 40px;
            border: 4px solid #ddd; border-top-color: #667eea;
            border-radius: 50%; animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .progress-bar {
            width: 200px; height: 6px; background: #ddd;
            border-radius: 3px; margin-top: 15px; overflow: hidden;
        }
        .progress-fill {
            height: 100%; background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%; transition: width 0.3s;
        }
        
        .loading-text { margin-top: 10px; color: #666; font-size: 14px; }
        .loading-subtext { color: #999; font-size: 12px; }

        .download-btn {
            margin-top: 15px; padding: 12px 30px;
            background: #28a745; color: white;
            border: none; border-radius: 8px;
            font-size: 14px; cursor: pointer;
            display: none;        }

        .error-message {
            background: #f8d7da; color: #721c24;
            padding: 12px; border-radius: 8px;
            margin: 15px 0; display: none; font-size: 13px;
        }

        .log-panel {
            background: #1e1e1e; color: #0f0;
            padding: 10px; border-radius: 8px;
            margin-top: 15px; font-size: 11px;
            max-height: 120px; overflow-y: auto;
            display: none; font-family: monospace;
        }
        .toggle-log {
            background: none; border: 1px solid #667eea;
            color: #667eea; padding: 8px 15px;
            border-radius: 5px; cursor: pointer;
            margin-top: 10px; font-size: 12px;
        }

        @media (max-width: 480px) {
            .options { grid-template-columns: 1fr; }
            .download-btn { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 Генератор Изображений</h1>
        <p class="subtitle">Pollinations.ai • Бесплатно</p>

        <div class="tip">
            💡 <strong>Совет:</strong> Используйте короткие запросы на английском. 
            Модель <strong>turbo</strong> работает быстрее (5-15 сек).
        </div>

        <div class="input-section">
            <label>📝 Описание (англ. надёжнее):</label>
            <textarea id="prompt" placeholder="cute dog, sunset, realistic style"></textarea>
        </div>

        <div class="options">
            <div>
                <label>Размер:</label>
                <select id="size">
                    <option value="512">512×512 (быстро)</option>
                    <option value="768">768×768</option>
                    <option value="1024" selected>1024×1024 (качество)</option>                </select>
            </div>
            <div>
                <label>Модель:</label>
                <select id="model">
                    <option value="turbo">⚡ Turbo (5-15 сек)</option>
                    <option value="flux" selected>✨ Flux (20-45 сек)</option>
                </select>
            </div>
        </div>

        <button class="generate-btn" onclick="generate()">✨ Сгенерировать</button>
        <div class="error-message" id="error"></div>

        <div class="result-section">
            <div class="image-container">
                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    <p class="loading-text" id="loadingText">Генерация...</p>
                    <p class="loading-subtext" id="loadingSub">Это может занять до 60 секунд</p>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progress"></div>
                    </div>
                </div>
                <img id="img" alt="Generated image">
                <p id="placeholder">Здесь появится ваше изображение</p>
            </div>
            <button class="download-btn" id="downloadBtn" onclick="download()">📥 Скачать</button>
        </div>

        <button class="toggle-log" onclick="toggleLog()">📋 Логи</button>
        <div class="log-panel" id="log"></div>
    </div>

    <script>
        let isLoading = false;
        let progressInterval = null;

        function log(msg) {
            const panel = document.getElementById('log');
            const time = new Date().toLocaleTimeString();
            panel.innerHTML += `[${time}] ${msg}<br>`;
            panel.scrollTop = panel.scrollHeight;
            console.log(msg);
        }

        function toggleLog() {
            const panel = document.getElementById('log');
            panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
        }
        function startProgress() {
            let progress = 0;
            const fill = document.getElementById('progress');
            const text = document.getElementById('loadingText');
            
            progressInterval = setInterval(() => {
                if (progress < 85) {
                    progress += Math.random() * 3 + 1;
                    fill.style.width = Math.min(progress, 85) + '%';
                    
                    if (progress > 30) text.textContent = 'Генерация изображения...';
                    if (progress > 60) text.textContent = 'Почти готово...';
                }
            }, 1000);
        }

        function stopProgress() {
            if (progressInterval) {
                clearInterval(progressInterval);
                progressInterval = null;
            }
            document.getElementById('progress').style.width = '100%';
        }

        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'flex' : 'none';
            document.getElementById('placeholder').style.display = show ? 'none' : 'block';
            document.getElementById('img').style.display = 'none';
            document.getElementById('downloadBtn').style.display = 'none';
            document.getElementById('progress').style.width = '0%';
        }

        function showError(msg) {
            const el = document.getElementById('error');
            el.textContent = msg;
            el.style.display = 'block';
            log(`❌ ${msg}`);
        }

        function hideError() {
            document.getElementById('error').style.display = 'none';
        }

        async function generate() {
            if (isLoading) return;
            
            const prompt = document.getElementById('prompt').value.trim();
            if (!prompt) { showError('Введите описание'); return; }
                        const size = document.getElementById('size').value;
            const model = document.getElementById('model').value;
            const seed = Math.floor(Math.random() * 1000000);
            
            hideError();
            showLoading(true);
            startProgress();
            document.querySelector('.generate-btn').disabled = true;
            isLoading = true;
            
            // 🔥 Формируем URL
            const url = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?width=${size}&height=${size}&seed=${seed}&nologo=true&model=${model}&t=${Date.now()}`;
            
            log(`🔗 Запрос: ${prompt}`);
            log(`📐 Размер: ${size}×${size} | Модель: ${model}`);
            log(`🔗 URL: ${url.substring(0, 120)}...`);
            
            const img = document.getElementById('img');
            let loaded = false;
            
            // 🔥 Обработчики
            img.onload = () => {
                if (loaded) return;
                loaded = true;
                stopProgress();
                log(`✅ Загружено! Размер: ${img.naturalWidth}×${img.naturalHeight}`);
                
                img.style.display = 'block';
                document.getElementById('placeholder').style.display = 'none';
                document.getElementById('downloadBtn').style.display = 'inline-block';
                showLoading(false);
                document.querySelector('.generate-btn').disabled = false;
                isLoading = false;
            };
            
            img.onerror = (e) => {
                if (loaded) return;
                loaded = true;
                stopProgress();
                log(`❌ Ошибка: ${e.type}`);
                showError('Не удалось загрузить. Попробуйте: 1) модель turbo 2) размер 512 3) проще запрос');
                showLoading(false);
                document.querySelector('.generate-btn').disabled = false;
                isLoading = false;
            };
            
            // 🔥 Загружаем изображение (без CORS проблем)
            img.referrerPolicy = 'no-referrer';
            img.src = url;
                        // 🔥 Длинный таймаут: 90 секунд для Flux, 45 для turbo
            const timeout = model === 'flux' ? 90000 : 45000;
            setTimeout(() => {
                if (!loaded && isLoading) {
                    stopProgress();
                    log(`⏰ Таймаут ${timeout/1000} сек`);
                    showError('Превышено время ожидания. Попробуйте модель <strong>turbo</strong> или размер <strong>512×512</strong>');
                    showLoading(false);
                    document.querySelector('.generate-btn').disabled = false;
                    isLoading = false;
                }
            }, timeout);
        }

        async function download() {
            const img = document.getElementById('img');
            if (!img.src) return;
            
            try {
                const response = await fetch(img.src);
                const blob = await response.blob();
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `image-${Date.now()}.jpg`;
                a.click();
                URL.revokeObjectURL(url);
                log('✅ Скачано');
            } catch {
                window.open(img.src, '_blank');
                log('🔗 Открыто в новой вкладке');
            }
        }

        // Enter для генерации
        document.getElementById('prompt').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                generate();
            }
        });

        log('🚀 Готово');
    </script>
</body>
</html>
