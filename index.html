<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор Изображений</title>
    
    <!-- Разрешаем загрузку изображений с любых источников -->
    <meta http-equiv="Content-Security-Policy" 
          content="default-src 'self' https: http:; 
                   img-src * data: blob: https: http:; 
                   connect-src * https: http:; 
                   style-src 'self' 'unsafe-inline'; 
                   script-src 'self' 'unsafe-inline'">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 15px;
        }
        .container {
            background: white;
            border-radius: 15px;
            padding: 20px;
            max-width: 100%;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }
        h1 { text-align: center; color: #333; margin: 10px 0; font-size: 1.8em; }
        
        .input-section { margin: 20px 0; }
        label { display: block; margin-bottom: 8px; color: #555; font-weight: 600; }
        
        textarea {
            width: 100%; padding: 12px; border: 2px solid #ddd;
            border-radius: 10px; font-size: 16px; min-height: 80px;
        }
        textarea:focus { outline: none; border-color: #667eea; }

        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 20px 0; }
        select {
            width: 100%; padding: 12px; border: 2px solid #ddd;
            border-radius: 10px; font-size: 14px; background: white;
        }

        .generate-btn {
            width: 100%; padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);            color: white; border: none; border-radius: 10px;
            font-size: 16px; font-weight: 600; cursor: pointer;
        }
        .generate-btn:disabled { opacity: 0.6; }

        .result-section { margin-top: 20px; text-align: center; }
        .image-container {
            min-height: 300px; background: #f5f5f5;
            border-radius: 10px; display: flex;
            justify-content: center; align-items: center;
            overflow: hidden; position: relative;
        }
        .image-container img {
            max-width: 100%; max-height: 400px;
            border-radius: 10px; display: none;
        }

        .loading {
            display: none; flex-direction: column;
            align-items: center; padding: 20px;
        }
        .spinner {
            width: 40px; height: 40px;
            border: 4px solid #ddd; border-top-color: #667eea;
            border-radius: 50%; animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { margin-top: 15px; color: #666; }

        .download-btn {
            margin-top: 15px; padding: 12px 30px;
            background: #28a745; color: white;
            border: none; border-radius: 8px;
            font-size: 14px; cursor: pointer;
            display: none;
        }

        .error-message {
            background: #f8d7da; color: #721c24;
            padding: 12px; border-radius: 8px;
            margin: 15px 0; display: none;
        }

        .log-panel {
            background: #1e1e1e; color: #0f0;
            padding: 10px; border-radius: 8px;
            margin-top: 15px; font-size: 11px;
            max-height: 150px; overflow-y: auto;
            display: none; font-family: monospace;
        }        .toggle-log {
            background: none; border: 1px solid #667eea;
            color: #667eea; padding: 8px 15px;
            border-radius: 5px; cursor: pointer;
            margin-top: 10px; font-size: 12px;
        }

        @media (max-width: 480px) {
            .options { grid-template-columns: 1fr; }
            .download-btn { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 Генератор Изображений</h1>

        <div class="input-section">
            <label>📝 Описание (англ. лучше):</label>
            <textarea id="prompt" placeholder="Dog sitting near doghouse, sunset, realistic"></textarea>
        </div>

        <div class="options">
            <div>
                <label>Ширина:</label>
                <select id="width">
                    <option value="512">512</option>
                    <option value="768">768</option>
                    <option value="1024" selected>1024</option>
                </select>
            </div>
            <div>
                <label>Модель:</label>
                <select id="model">
                    <option value="flux">Flux (лучше)</option>
                    <option value="turbo">Turbo (быстро)</option>
                </select>
            </div>
        </div>

        <button class="generate-btn" onclick="generate()">✨ Сгенерировать</button>
        <div class="error-message" id="error"></div>

        <div class="result-section">
            <div class="image-container">
                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    <p class="loading-text" id="loadingText">Загрузка...</p>
                </div>
                <img id="img" alt="Generated">                <p id="placeholder">Здесь будет изображение</p>
            </div>
            <button class="download-btn" id="downloadBtn" onclick="download()">📥 Скачать</button>
        </div>

        <button class="toggle-log" onclick="toggleLog()">📋 Логи</button>
        <div class="log-panel" id="log"></div>
    </div>

    <script>
        function log(msg) {
            const panel = document.getElementById('log');
            const time = new Date().toLocaleTimeString();
            panel.innerHTML += `[${time}] ${msg}<br>`;
            panel.scrollTop = panel.scrollHeight;
            console.log(msg);
        }

        function toggleLog() {
            const panel = document.getElementById('log');
            panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
        }

        function showLoading(show, text = 'Загрузка...') {
            document.getElementById('loading').style.display = show ? 'flex' : 'none';
            document.getElementById('placeholder').style.display = show ? 'none' : 'block';
            document.getElementById('loadingText').textContent = text;
            document.getElementById('img').style.display = 'none';
            document.getElementById('downloadBtn').style.display = 'none';
        }

        function showError(msg) {
            const el = document.getElementById('error');
            el.textContent = msg;
            el.style.display = 'block';
            log(`❌ ${msg}`);
        }

        function hideError() {
            document.getElementById('error').style.display = 'none';
        }

        async function generate() {
            const prompt = document.getElementById('prompt').value.trim();
            if (!prompt) { showError('Введите описание'); return; }
            
            const width = document.getElementById('width').value;
            const model = document.getElementById('model').value;
            const seed = Math.floor(Math.random() * 1000000);
                        hideError();
            showLoading(true);
            document.querySelector('.generate-btn').disabled = true;
            
            // 🔥 Ключевое: простая прямая ссылка без fetch
            const url = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?width=${width}&height=${width}&seed=${seed}&nologo=true&model=${model}&t=${Date.now()}`;
            
            log(`🔗 ${url.substring(0, 100)}...`);
            
            const img = document.getElementById('img');
            
            // Простая загрузка изображения - БЕЗ fetch, БЕЗ CORS проблем
            img.onload = () => {
                log('✅ Изображение загружено');
                img.style.display = 'block';
                document.getElementById('placeholder').style.display = 'none';
                document.getElementById('downloadBtn').style.display = 'inline-block';
                showLoading(false);
                document.querySelector('.generate-btn').disabled = false;
            };
            
            img.onerror = (e) => {
                log(`❌ Ошибка загрузки: ${e.type}`);
                showError('Не удалось загрузить. Попробуйте упростить запрос или сменить модель.');
                showLoading(false);
                document.querySelector('.generate-btn').disabled = false;
            };
            
            // 🔥 ВАЖНО: не добавляем crossOrigin, чтобы не вызывать CORS preflight
            img.src = url;
            
            // Таймаут на случай зависания
            setTimeout(() => {
                if (img.style.display === 'none' && document.getElementById('loading').style.display !== 'none') {
                    log('⏰ Таймаут 45 сек');
                    showError('Превышено время ожидания. Попробуйте ещё раз.');
                    showLoading(false);
                    document.querySelector('.generate-btn').disabled = false;
                }
            }, 45000);
        }

        async function download() {
            const img = document.getElementById('img');
            if (!img.src) return;
            
            try {
                // Пробуем скачать через blob
                const response = await fetch(img.src);
                const blob = await response.blob();                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `image-${Date.now()}.jpg`;
                a.click();
                URL.revokeObjectURL(url);
                log('✅ Скачано');
            } catch {
                // Если не вышло - просто открываем в новой вкладке
                window.open(img.src, '_blank');
                log('🔗 Открыто в новой вкладке');
            }
        }

        // Генерация по Enter
        document.getElementById('prompt').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                generate();
            }
        });

        log('🚀 Готово к работе');
    </script>
</body>
</html>
