<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Генератор Изображений</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 15px;
            touch-action: manipulation;
        }

        .container {
            background: white;
            border-radius: 15px;
            padding: 20px;
            max-width: 100%;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 1.8em;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 20px;
            font-size: 13px;
        }

        .free-badge {
            display: inline-block;
            background: #28a745;
            color: white;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .status-bar {
            background: #e7f3ff;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 12px;
            color: #1976D2;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #28a745;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .input-section {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
            font-size: 14px;
        }

        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            resize: vertical;
            min-height: 80px;
            transition: border-color 0.3s;
            -webkit-appearance: none;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 14px;
            background: white;
            cursor: pointer;
            -webkit-appearance: none;
            appearance: none;
        }

        .generate-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            touch-action: manipulation;
        }

        .generate-btn:active {
            transform: scale(0.98);
        }

        .generate-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .result-section {
            margin-top: 20px;
            text-align: center;
        }

        .image-container {
            min-height: 300px;
            background: #f5f5f5;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        .image-container img {
            max-width: 100%;
            max-height: 400px;
            border-radius: 10px;
        }

        .loading {
            display: none;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #ddd;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            margin-top: 15px;
            color: #666;
            font-size: 14px;
        }

        .progress-bar {
            width: 200px;
            height: 6px;
            background: #ddd;
            border-radius: 3px;
            margin-top: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.3s;
        }

        .download-btn, .new-image-btn {
            margin-top: 15px;
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            display: none;
            touch-action: manipulation;
        }

        .download-btn {
            background: #28a745;
            color: white;
        }

        .new-image-btn {
            background: #667eea;
            color: white;
            margin-left: 10px;
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 12px;
            border-radius: 8px;
            margin-top: 15px;
            display: none;
            font-size: 13px;
        }

        .debug-info {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 11px;
            color: #666;
            display: none;
            text-align: left;
        }

        .debug-info h4 {
            margin-bottom: 8px;
            color: #333;
        }

        .toggle-debug {
            background: none;
            border: none;
            color: #667eea;
            font-size: 12px;
            cursor: pointer;
            margin-top: 10px;
            padding: 5px;
        }

        /* Mobile optimizations */
        @media (max-width: 480px) {
            .container {
                padding: 15px;
            }
            
            h1 {
                font-size: 1.5em;
            }
            
            .options {
                grid-template-columns: 1fr;
            }
            
            .download-btn, .new-image-btn {
                width: 100%;
                margin: 10px 0 0 0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 Генератор Изображений</h1>
        <p class="subtitle">Бесплатно • Без регистрации</p>
        <div style="text-align: center;">
            <span class="free-badge">🆓 БЕСПЛАТНО</span>
        </div>

        <div class="status-bar" id="statusBar">
            <div class="status-dot" id="statusDot"></div>
            <span id="statusText">Проверка соединения...</span>
        </div>

        <div class="input-section">
            <label for="prompt">📝 Описание:</label>
            <textarea 
                id="prompt" 
                placeholder="Красивый закат над океаном, пальмы, розовое небо..."
                autocomplete="off"
            ></textarea>
        </div>

        <div class="options">
            <div>
                <label for="width">Ширина:</label>
                <select id="width">
                    <option value="512">512 px</option>
                    <option value="768">768 px</option>
                    <option value="1024" selected>1024 px</option>
                </select>
            </div>

            <div>
                <label for="height">Высота:</label>
                <select id="height">
                    <option value="512">512 px</option>
                    <option value="768">768 px</option>
                    <option value="1024" selected>1024 px</option>
                </select>
            </div>
        </div>

        <button class="generate-btn" id="generateBtn" onclick="generateImage()">
            ✨ Сгенерировать
        </button>

        <div class="error-message" id="errorMessage"></div>

        <div class="result-section">
            <div class="image-container" id="imageContainer">
                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    <p class="loading-text" id="loadingText">Генерация...</p>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                </div>
                <img id="generatedImage" src="" alt="Изображение" style="display: none;">
                <p id="placeholderText" style="color: #999; font-size: 14px;">Здесь появится изображение</p>
            </div>
            <button class="download-btn" id="downloadBtn" onclick="downloadImage()">
                📥 Скачать
            </button>
            <button class="new-image-btn" id="newImageBtn" onclick="generateNewImage()">
                🔄 Ещё
            </button>
        </div>

        <button class="toggle-debug" onclick="toggleDebug()">🔧 Показать диагностику</button>
        
        <div class="debug-info" id="debugInfo">
            <h4>Диагностика:</h4>
            <div id="debugContent"></div>
        </div>
    </div>

    <script>
        let currentSeed = Math.floor(Math.random() * 1000000);
        let lastPrompt = '';
        let isLoading = false;

        // Проверка соединения при загрузке
        window.addEventListener('load', checkConnection);

        async function checkConnection() {
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');
            
            try {
                const testImage = new Image();
                testImage.onload = () => {
                    statusDot.style.background = '#28a745';
                    statusText.textContent = '✅ Сервис доступен';
                    updateDebug('Соединение: OK');
                };
                testImage.onerror = () => {
                    statusDot.style.background = '#dc3545';
                    statusText.textContent = '⚠️ Проблемы с соединением';
                    updateDebug('Соединение: ОШИБКА');
                };
                testImage.src = 'https://image.pollinations.ai/prompt/test?width=10&height=10&nologo=true&t=' + Date.now();
            } catch (e) {
                statusDot.style.background = '#dc3545';
                statusText.textContent = '❌ Нет соединения';
                updateDebug('Соединение: НЕДОСТУПНО - ' + e.message);
            }
        }

        function updateDebug(message) {
            const debugContent = document.getElementById('debugContent');
            const time = new Date().toLocaleTimeString();
            debugContent.innerHTML += `<div>[${time}] ${message}</div>`;
        }

        function toggleDebug() {
            const debugInfo = document.getElementById('debugInfo');
            debugInfo.style.display = debugInfo.style.display === 'block' ? 'none' : 'block';
        }

        async function generateImage() {
            if (isLoading) return;
            
            const prompt = document.getElementById('prompt').value.trim();
            const width = document.getElementById('width').value;
            const height = document.getElementById('height').value;

            if (!prompt) {
                showError('Введите описание изображения!');
                updateDebug('Ошибка: Пустой запрос');
                return;
            }

            if (!navigator.onLine) {
                showError('Нет подключения к интернету!');
                updateDebug('Ошибка: Нет интернета');
                return;
            }

            isLoading = true;
            hideError();
            showLoading(true);
            document.getElementById('generateBtn').disabled = true;

            currentSeed = Math.floor(Math.random() * 1000000);
            lastPrompt = prompt;

            updateDebug(`Запрос: ${prompt.substring(0, 50)}...`);
            updateDebug(`Размер: ${width}x${height}, Seed: ${currentSeed}`);

            const encodedPrompt = encodeURIComponent(prompt);
            const imageUrl = `https://image.pollinations.ai/prompt/${encodedPrompt}?width=${width}&height=${height}&seed=${currentSeed}&nologo=true&t=${Date.now()}`;

            updateDebug(`URL: ${imageUrl.substring(0, 100)}...`);

            try {
                const img = document.getElementById('generatedImage');
                
                // Прогресс бар
                let progress = 0;
                const progressInterval = setInterval(() => {
                    if (progress < 90) {
                        progress += 10;
                        document.getElementById('progressFill').style.width = progress + '%';
                        document.getElementById('loadingText').textContent = `Загрузка... ${progress}%`;
                    }
                }, 500);

                await new Promise((resolve, reject) => {
                    img.onload = () => {
                        clearInterval(progressInterval);
                        document.getElementById('progressFill').style.width = '100%';
                        resolve();
                    };
                    img.onerror = (e) => {
                        clearInterval(progressInterval);
                        reject(new Error('Не удалось загрузить изображение'));
                    };
                    img.src = imageUrl;
                    
                    // Таймаут на 30 секунд
                    setTimeout(() => {
                        reject(new Error('Превышено время ожидания (30 сек)'));
                    }, 30000);
                });

                img.style.display = 'block';
                document.getElementById('placeholderText').style.display = 'none';
                document.getElementById('downloadBtn').style.display = 'inline-block';
                document.getElementById('newImageBtn').style.display = 'inline-block';
                updateDebug('✅ Изображение создано успешно');

            } catch (error) {
                console.error('Ошибка:', error);
                showError(`Ошибка: ${error.message}. Попробуйте упростить запрос.`);
                updateDebug(`❌ Ошибка: ${error.message}`);
                document.getElementById('placeholderText').style.display = 'block';
                
                // Проверка HTTPS
                if (window.location.protocol === 'file:') {
                    showError('⚠️ Открываете файл локально? Некоторые браузеры блокируют запросы. Попробуйте открыть через локальный сервер или используйте другой браузер.');
                    updateDebug('Протокол: file:// (может блокироваться)');
                }
            } finally {
                isLoading = false;
                showLoading(false);
                document.getElementById('generateBtn').disabled = false;
            }
        }

        function generateNewImage() {
            document.getElementById('seed').value = 'random';
            generateImage();
        }

        function showLoading(isLoading) {
            const loading = document.getElementById('loading');
            const placeholder = document.getElementById('placeholderText');
            const img = document.getElementById('generatedImage');
            
            if (isLoading) {
                loading.style.display = 'flex';
                placeholder.style.display = 'none';
                img.style.display = 'none';
                document.getElementById('downloadBtn').style.display = 'none';
                document.getElementById('newImageBtn').style.display = 'none';
            } else {
                loading.style.display = 'none';
            }
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }

        function hideError() {
            document.getElementById('errorMessage').style.display = 'none';
        }

        async function downloadImage() {
            const img = document.getElementById('generatedImage');
            const imageUrl = img.src;
            
            try {
                const response = await fetch(imageUrl);
                const blob = await response.blob();
                
                const url = window.URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `image-${Date.now()}.jpg`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                window.URL.revokeObjectURL(url);
                updateDebug('✅ Изображение скачано');
            } catch (error) {
                window.open(imageUrl, '_blank');
                updateDebug('⚠️ Открыто в новой вкладке');
            }
        }

        // Поддержка Enter для генерации
        document.getElementById('prompt').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                generateImage();
            }
        });

        // Обработка потери соединения
        window.addEventListener('offline', () => {
            showError('⚠️ Потеряно подключение к интернету');
            updateDebug('Статус: OFFLINE');
        });

        window.addEventListener('online', () => {
            hideError();
            checkConnection();
            updateDebug('Статус: ONLINE');
        });

        // Логирование информации об устройстве
        updateDebug(`Устройство: ${navigator.userAgent.substring(0, 50)}...`);
        updateDebug(`Протокол: ${window.location.protocol}`);
        updateDebug(`Онлайн: ${navigator.onLine ? 'Да' : 'Нет'}`);
    </script>
</body>
</html>
